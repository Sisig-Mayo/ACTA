name: acta
description: "ACTA: Context-Aware Decision-to-Action Simulation Engine — Flutter Dashboard"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # --- State Management ---
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # --- Geospatial / Mapping ---
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # --- HTTP Client ---
  dio: ^5.7.0

  # --- Typography ---
  google_fonts: ^6.2.1

  # --- Utilities ---
  intl: ^0.19.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.9.0
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true
  assets:
    - lib/assets/

