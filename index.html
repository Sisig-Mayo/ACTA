<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/ACTA/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="ACTA — Adaptive Crisis and Threat Assessment. AI-powered flood simulation and action planning system for Manila.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ACTA">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>ACTA</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      background: #ffffff;
    }

    .app-loader {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: #ffffff;
      z-index: 9999;
      transition: opacity 180ms ease;
    }

    .app-loader--hidden {
      opacity: 0;
      pointer-events: none;
    }

    .app-loader__content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      font-family: Arial, Helvetica, sans-serif;
      color: #111827;
      font-size: 14px;
      font-weight: 600;
    }

    .app-loader__logo {
      width: 112px;
      height: 112px;
      object-fit: contain;
      animation: logo-float 2400ms ease-in-out infinite alternate;
    }

    .app-loader__bar {
      width: 190px;
      height: 5px;
      overflow: hidden;
      border-radius: 999px;
      background: #e5e7eb;
    }

    .app-loader__bar::before {
      content: "";
      display: block;
      width: 42%;
      height: 100%;
      border-radius: inherit;
      background: #13587a;
      animation: loader-slide 1200ms ease-in-out infinite;
    }

    @keyframes logo-float {
      from {
        transform: translateY(-8px);
      }

      to {
        transform: translateY(8px);
      }
    }

    @keyframes loader-slide {
      0% {
        transform: translateX(-100%);
      }

      100% {
        transform: translateX(240%);
      }
    }
  </style>
</head>
<body>
  <div id="app-loader" class="app-loader" aria-label="Loading ACTA">
    <div class="app-loader__content">
      <img
        class="app-loader__logo"
        src="assets/lib/assets/logo-1.png"
        alt="ACTA"
      >
      <div class="app-loader__bar" aria-hidden="true"></div>
      <div>Preparing ACTA...</div>
    </div>
  </div>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var loader = document.getElementById('app-loader');
      if (!loader) return;
      loader.classList.add('app-loader--hidden');
      window.setTimeout(function () {
        loader.remove();
      }, 220);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
